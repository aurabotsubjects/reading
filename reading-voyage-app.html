<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Te Haerenga — Term Reading Voyage</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500;600&display=swap');

:root{
  --ink:#1B2A38;
  --paper:#F1E8D6;
  --paper-deep:#E7DBC2;
  --teal:#2F6E6A;      /* Monday — whole class */
  --sky:#3E6E96;        /* Tuesday — level groups */
  --gold:#C99A3F;       /* Wednesday — pairs */
  --moss:#5C7A52;        /* Thursday — build */
  --sienna:#B5541F;      /* Friday — present */
  --line:#cbb98f;
  --card:#FBF7EE;
}

*{box-sizing:border-box;}
html,body{margin:0;padding:0;}
body{
  background:var(--paper);
  color:var(--ink);
  font-family:'Inter',sans-serif;
  min-height:100vh;
}

.wrap{max-width:1040px;margin:0 auto;padding:28px 20px 60px;}

/* ---------- Header ---------- */
header{display:flex;flex-wrap:wrap;align-items:baseline;justify-content:space-between;gap:10px;border-bottom:2px solid var(--ink);padding-bottom:16px;margin-bottom:28px;}
.brand-eyebrow{font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:var(--teal);font-weight:600;}
h1{font-family:'Fraunces',serif;font-weight:600;font-size:clamp(28px,4vw,40px);margin:2px 0 0;letter-spacing:-.01em;}
.subtitle{font-family:'JetBrains Mono',monospace;font-size:12px;color:#5a5140;text-align:right;line-height:1.5;}

/* ---------- Voyage route (signature element) ---------- */
.voyage{position:relative;margin-bottom:34px;padding:22px 6px 10px;overflow-x:auto;}
.voyage-track{position:relative;display:flex;align-items:flex-start;min-width:920px;padding:0 10px;}
.voyage-line{position:absolute;top:15px;left:16px;right:16px;height:0;border-top:2.5px dashed var(--line);z-index:0;}
.stop{position:relative;z-index:1;flex:1;display:flex;flex-direction:column;align-items:center;cursor:pointer;text-align:center;padding:0 4px;}
.dot{width:14px;height:14px;border-radius:50%;background:var(--card);border:2.5px solid var(--teal);transition:transform .15s ease, background .15s ease;}
.stop:hover .dot{transform:scale(1.25);}
.stop.active .dot{background:var(--sienna);border-color:var(--sienna);width:18px;height:18px;box-shadow:0 0 0 5px rgba(181,84,31,.18);}
.stop .wk{font-family:'JetBrains Mono',monospace;font-size:10px;color:#7a6f57;margin-top:8px;letter-spacing:.06em;}
.stop.active .wk{color:var(--sienna);font-weight:600;}
.stop .title{font-size:11.5px;line-height:1.25;margin-top:2px;max-width:92px;color:var(--ink);font-weight:500;}
.stop.active .title{font-weight:700;}
.bird{position:absolute;top:-13px;font-size:16px;transform:translateX(-50%);left:50%;}

/* ---------- Controls ---------- */
.controls{display:flex;flex-wrap:wrap;gap:14px;align-items:center;background:var(--card);border:1.5px solid var(--ink);padding:14px 18px;margin-bottom:22px;}
.field{display:flex;flex-direction:column;gap:4px;}
.field label{font-family:'JetBrains Mono',monospace;font-size:10px;text-transform:uppercase;letter-spacing:.08em;color:#5a5140;}
select{
  font-family:'Inter',sans-serif;font-weight:600;font-size:14px;color:var(--ink);
  background:var(--paper);border:1.5px solid var(--ink);padding:7px 10px;min-width:170px;
  appearance:none;-webkit-appearance:none;
  background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='10' height='6'><path d='M0 0L5 6L10 0Z' fill='%231B2A38'/></svg>");
  background-repeat:no-repeat;background-position:right 10px center;padding-right:28px;
}
.print-btn{margin-left:auto;font-family:'JetBrains Mono',monospace;font-size:12px;font-weight:600;letter-spacing:.04em;background:var(--ink);color:var(--paper);border:none;padding:10px 16px;cursor:pointer;}
.print-btn:hover{background:var(--sienna);}
.plan-btn{font-family:'JetBrains Mono',monospace;font-size:12px;font-weight:600;letter-spacing:.04em;background:transparent;color:var(--ink);border:1.5px solid var(--ink);padding:9px 16px;cursor:pointer;}
.plan-btn:hover{background:var(--ink);color:var(--paper);}

/* ---------- Lesson plan overlay ---------- */
.overlay{position:fixed;inset:0;background:rgba(27,42,56,.55);display:none;align-items:flex-start;justify-content:center;padding:34px 16px;overflow-y:auto;z-index:50;}
.overlay.open{display:flex;}
.plan-doc{background:var(--card);border:1.5px solid var(--ink);max-width:820px;width:100%;margin-bottom:40px;}
.plan-topbar{position:sticky;top:0;display:flex;justify-content:space-between;align-items:center;background:var(--ink);color:var(--paper);padding:12px 20px;}
.plan-topbar .lbl{font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:.08em;text-transform:uppercase;}
.plan-topbar .actions button{font-family:'JetBrains Mono',monospace;font-size:11px;font-weight:600;background:transparent;color:var(--paper);border:1px solid var(--paper);padding:6px 12px;margin-left:8px;cursor:pointer;}
.plan-topbar .actions button:hover{background:var(--paper);color:var(--ink);}
.plan-body{padding:30px 34px 40px;}
.plan-body h2.doc-title{font-family:'Fraunces',serif;font-size:26px;margin:0 0 4px;}
.plan-body .doc-sub{font-family:'JetBrains Mono',monospace;font-size:11.5px;color:#5a5140;margin-bottom:24px;}
.plan-block{margin-bottom:26px;}
.plan-block h3{font-family:'Fraunces',serif;font-size:16.5px;border-bottom:1.5px solid var(--ink);padding-bottom:6px;margin:0 0 10px;}
.wali{font-size:13.5px;background:var(--paper);border-left:4px solid var(--teal);padding:8px 12px;margin-bottom:10px;font-style:italic;}
.curr-item{font-size:13.5px;line-height:1.5;margin-bottom:8px;padding-left:14px;border-left:3px solid var(--line);}
.curr-item b{color:var(--ink);}
.day-plan{border:1px solid var(--line);margin-bottom:14px;}
.day-plan .dp-head{padding:10px 14px;color:#fff;font-family:'JetBrains Mono',monospace;font-size:12px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;}
.day-plan .dp-body{padding:14px 16px;background:var(--paper);}
.dp-wali{font-size:13px;font-weight:600;margin-bottom:10px;}
.dp-step{display:flex;gap:10px;margin-bottom:10px;font-size:13.5px;line-height:1.45;}
.dp-step .mins{font-family:'JetBrains Mono',monospace;font-size:11px;color:#7a6f57;min-width:52px;flex-shrink:0;padding-top:1px;}
.dp-step .say{background:#fff;border:1px dashed var(--line);padding:6px 10px;margin-top:4px;font-style:italic;color:#3d3527;}
.dp-step .say::before{content:"\\201C";font-style:normal;color:var(--sienna);font-weight:700;margin-right:2px;}

.reflect-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(230px,1fr));gap:12px;}
.reflect-card{border:1px solid var(--line);background:var(--paper);padding:12px 14px;}
.reflect-card .rv{font-family:'Fraunces',serif;font-weight:700;font-size:14.5px;color:var(--moss);margin-bottom:2px;}
.reflect-card .re{font-family:'JetBrains Mono',monospace;font-size:9.5px;text-transform:uppercase;letter-spacing:.06em;color:#7a6f57;margin-bottom:6px;}
.reflect-card .rq{font-size:13.5px;line-height:1.45;font-style:italic;}
.motto-line{font-family:'JetBrains Mono',monospace;font-size:10.5px;letter-spacing:.06em;color:#7a6f57;margin-top:2px;}

.ws-btn{margin-top:8px;font-family:'JetBrains Mono',monospace;font-size:11px;font-weight:600;background:var(--ink);color:var(--paper);border:none;padding:6px 11px;cursor:pointer;}
.ws-btn:hover{background:var(--sienna);}

/* ---------- Worksheet document ---------- */
.ws-quiet{font-family:'JetBrains Mono',monospace;font-size:11.5px;background:var(--paper);border-left:4px solid var(--sienna);padding:8px 12px;margin-bottom:18px;}
.ws-block{margin-bottom:22px;}
.ws-block h3{font-family:'Fraunces',serif;font-size:15.5px;border-bottom:1.5px solid var(--ink);padding-bottom:6px;margin:0 0 10px;}
.ws-res{font-size:13px;background:var(--paper);border:1px dashed var(--line);padding:8px 12px;margin-bottom:14px;}
.ws-q{font-size:13.5px;margin-bottom:14px;}
.ws-line{border-bottom:1px solid var(--ink);height:20px;margin-top:4px;}
.ws-card{border:1px solid var(--ink);background:#fff;padding:8px 10px;margin-bottom:6px;font-size:12.5px;}
.ws-cutgrid{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:8px;margin-bottom:6px;}
.ws-order-box{display:flex;gap:8px;align-items:flex-start;margin-bottom:6px;font-size:12.5px;}
.ws-order-box .num{border:1.5px solid var(--ink);width:26px;height:22px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-family:'JetBrains Mono',monospace;font-weight:700;font-size:11px;}
.ws-namefield{display:flex;gap:24px;font-family:'JetBrains Mono',monospace;font-size:11px;margin-bottom:20px;}
.ws-namefield span{border-bottom:1px solid var(--ink);flex:1;padding-bottom:3px;}
.proj-example{font-size:13.5px;line-height:1.5;background:var(--paper);border-left:4px solid var(--gold);padding:10px 14px;font-style:italic;}
.proj-example .lbl2{display:block;font-family:'JetBrains Mono',monospace;font-size:10px;text-transform:uppercase;letter-spacing:.06em;color:#7a6f57;font-style:normal;margin-bottom:6px;}

/* ---------- Lesson card ---------- */
.lesson{background:var(--card);border:1.5px solid var(--ink);}
.lesson-head{display:flex;justify-content:space-between;align-items:flex-start;flex-wrap:wrap;gap:8px;padding:20px 22px;border-bottom:2px solid var(--ink);}
.daypill{display:inline-block;font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:#fff;padding:4px 10px;font-weight:600;}
.lesson-head h2{font-family:'Fraunces',serif;font-size:24px;margin:8px 0 0;font-weight:600;}
.lesson-head .grouping{font-family:'JetBrains Mono',monospace;font-size:11px;color:#5a5140;margin-top:4px;}
.duration{font-family:'JetBrains Mono',monospace;font-size:12px;text-align:right;color:#5a5140;}
.duration b{color:var(--ink);font-size:15px;}

/* timeline */
.timeline{display:flex;height:26px;margin:18px 22px 0;border:1.5px solid var(--ink);}
.tl-seg{display:flex;align-items:center;justify-content:center;font-family:'JetBrains Mono',monospace;font-size:10px;color:#fff;border-right:1.5px solid var(--ink);white-space:nowrap;overflow:hidden;}
.tl-seg:last-child{border-right:none;}

.lesson-body{padding:22px;}
.section{margin-bottom:22px;}
.section h3{font-family:'Fraunces',serif;font-size:16px;margin:0 0 10px;padding-bottom:6px;border-bottom:1px solid var(--line);}
ol,ul{margin:0;padding-left:20px;}
li{margin-bottom:6px;line-height:1.45;font-size:14.5px;}

.vocab-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(210px,1fr));gap:10px;}
.vocab-card{background:var(--paper);border:1px solid var(--line);padding:9px 11px;}
.vocab-card .w{font-weight:700;font-size:13.5px;color:var(--teal);}
.vocab-card .m{font-size:12.5px;color:#3d3527;margin-top:2px;line-height:1.35;}

.group-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:12px;}
.group-card{border:1px solid var(--line);background:var(--paper);padding:12px 14px;}
.group-card .g{font-family:'JetBrains Mono',monospace;font-size:11px;text-transform:uppercase;letter-spacing:.06em;color:var(--sky);font-weight:700;margin-bottom:6px;}
.group-card p{margin:4px 0;font-size:13.5px;line-height:1.4;}

.activity{border:1px solid var(--line);background:var(--paper);padding:12px 14px;margin-bottom:10px;}
.activity .a-title{font-weight:700;font-size:14px;color:var(--gold);margin-bottom:3px;}

.project-list{display:grid;grid-template-columns:repeat(auto-fit,minmax(230px,1fr));gap:10px;}
.project-card{border:1px solid var(--line);background:var(--paper);padding:10px 13px;font-size:13.5px;}

.tags{display:flex;flex-wrap:wrap;gap:7px;margin-top:4px;}
.tag{font-family:'JetBrains Mono',monospace;font-size:10.5px;background:var(--ink);color:var(--paper);padding:4px 9px;letter-spacing:.03em;}

.empty{padding:50px 22px;text-align:center;}
.empty .glyph{font-size:30px;margin-bottom:10px;}
.empty h3{font-family:'Fraunces',serif;font-size:19px;margin:0 0 8px;}
.empty p{font-size:13.5px;color:#5a5140;max-width:440px;margin:0 auto;line-height:1.5;}

footer{margin-top:26px;font-family:'JetBrains Mono',monospace;font-size:11px;color:#7a6f57;text-align:center;}

@media (max-width:640px){
  .subtitle{text-align:left;}
  .duration{text-align:left;}
  .print-btn{margin-left:0;}
}

@media print{
  .voyage,.controls,.print-btn,.ws-btn{display:none !important;}
  body{background:#fff;}
  .lesson{border:none;}
  body.plan-open .wrap{display:none !important;}
  body.plan-open .overlay#planOverlay{display:block !important;position:static;background:none;padding:0;}
  body.worksheet-open .wrap{display:none !important;}
  body.worksheet-open .overlay#worksheetOverlay{display:block !important;position:static;background:none;padding:0;}
  body.project-open .wrap{display:none !important;}
  body.project-open .overlay#projectOverlay{display:block !important;position:static;background:none;padding:0;}
  .plan-topbar{display:none !important;}
  .plan-doc{border:none;max-width:none;}
}
</style>
</head>
<body>
<div class="wrap">

  <header>
    <div>
      <div class="brand-eyebrow">Years 5–6 · NZC English Phase 2</div>
      <h1>Te Haerenga <span style="font-weight:400;color:#5a5140;">— Term Reading Voyage</span></h1>
    </div>
    <div class="subtitle">11-week programme<br>1 story per week · ~50 min lessons<br><span class="motto-line" style="display:inline">Soli Deo Gloria — To God Alone the Glory</span></div>
  </header>

  <!-- Voyage route: signature element -->
  <div class="voyage">
    <div class="voyage-track" id="track">
      <div class="voyage-line"></div>
    </div>
  </div>

  <div class="controls">
    <div class="field">
      <label for="weekSelect">Week</label>
      <select id="weekSelect"></select>
    </div>
    <div class="field">
      <label for="daySelect">Day</label>
      <select id="daySelect">
        <option value="mon">Monday</option>
        <option value="tue">Tuesday</option>
        <option value="wed">Wednesday</option>
        <option value="thu">Thursday</option>
        <option value="fri">Friday</option>
      </select>
    </div>
    <button class="plan-btn" onclick="openPlan()">Week Lesson Plan</button>
    <button class="print-btn" onclick="window.print()">Print this lesson</button>
  </div>

  <div class="lesson" id="lessonArea"></div>

  <footer>Te Haerenga · built around the term's 11 voyaging &amp; migration texts</footer>
</div>

<div class="overlay" id="planOverlay">
  <div class="plan-doc">
    <div class="plan-topbar">
      <span class="lbl" id="planTopLabel">Week Lesson Plan</span>
      <span class="actions">
        <button onclick="window.print()">Print</button>
        <button onclick="closePlan()">Close ✕</button>
      </span>
    </div>
    <div class="plan-body" id="planBody"></div>
  </div>
</div>

<div class="overlay" id="worksheetOverlay">
  <div class="plan-doc">
    <div class="plan-topbar">
      <span class="lbl" id="wsTopLabel">Worksheet</span>
      <span class="actions">
        <button onclick="window.print()">Print</button>
        <button onclick="closeWorksheet()">Close ✕</button>
      </span>
    </div>
    <div class="plan-body" id="worksheetBody"></div>
  </div>
</div>

<div class="overlay" id="projectOverlay">
  <div class="plan-doc">
    <div class="plan-topbar">
      <span class="lbl" id="projTopLabel">Project Guide</span>
      <span class="actions">
        <button onclick="window.print()">Print</button>
        <button onclick="closeProject()">Close ✕</button>
      </span>
    </div>
    <div class="plan-body" id="projectBody"></div>
  </div>
</div>

<script>
const DAY_META = {
  mon:{label:'Monday',grouping:'Whole class',color:'var(--teal)',focus:'Lead-in, vocabulary & comprehension'},
  tue:{label:'Tuesday',grouping:'Level groups',color:'var(--sky)',focus:'Guided reading'},
  wed:{label:'Wednesday',grouping:'Pairs',color:'var(--gold)',focus:'Reading activities'},
  thu:{label:'Thursday',grouping:'Pairs / small groups',color:'var(--moss)',focus:'Understanding project — build'},
  fri:{label:'Friday',grouping:'Pairs → whole class',color:'var(--sienna)',focus:'Understanding project — finish & present'}
};

const weeks = [
  {
    n:1, title:"The Journey", built:true,
    days:{
      mon:{
        time:[{l:'Hook',m:5},{l:'Vocab & read',m:35},{l:'Check',m:10}],
        sections:[
          {h:'Lead-in questions', type:'list', items:[
            "Have you ever had to do something you didn't want to, even though everyone told you it was important? How did you feel?",
            "Look at the title and first page. Who do you think 'Wilfred' is? What might 'the Journey' be?",
            "Do you know any animals that travel huge distances every year? What do you already know about migration?"
          ]},
          {h:'Key vocabulary', type:'vocab', items:[
            ['godwit','a long-beaked shorebird that flies between Alaska and NZ every year'],
            ['flock','a large group of birds travelling or living together'],
            ['solemnly','in a serious, formal way'],
            ['elder','an older, respected member of a group'],
            ['captain','the leader in charge of a journey or crew'],
            ['duty','something you must do because it is your responsibility'],
            ['exhausted','extremely tired, with no energy left'],
            ['amazement','a feeling of great surprise'],
            ['"too chicken"','idiom — too scared to do something'],
            ['"birdbrain"','joking insult meaning silly (funny here — they ARE birds!)']
          ]},
          {h:'Basic comprehension (whole class check)', type:'list', items:[
            'Where do the godwits live in summer, and where are they flying to?',
            'About how far is the journey, in kilometres?',
            "Why doesn't Wilfred want to go at first?",
            'Who is Captain Thunder, and why does everyone respect him?',
            'What happened to Flight Officer Wingspan during the storm?',
            'How did Captain Thunder and the flock survive the storm?'
          ]}
        ],
        tags:['Oral language','Vocabulary knowledge','Activating prior knowledge','Literal comprehension']
      },
      tue:{
        time:[{l:'Re-read',m:15},{l:'Group tasks',m:30},{l:'Share',m:5}],
        sections:[
          {h:'Level group tasks', type:'groups', items:[
            ['Group A — needs more support','Re-read pages 1–3 together with teacher.','Sequence 4 picture/sentence cards in the order events happened.'],
            ['Group B — at level (teacher-led)','Focus: how dialogue shows character.','Find 2 pieces of evidence Wilfred is nervous, and 2 that show he\'s brave by the end.'],
            ['Group C — extending','Focus: inference & humour — why is calling a bird "chicken" or "birdbrain" funny?','Write one more line of dialogue Wilfred might say once they land in NZ, staying true to character.']
          ]}
        ],
        tags:['Reading progression','Fluency & comprehension at instructional level','Differentiated instruction']
      },
      wed:{
        time:[{l:'Set up',m:5},{l:'Paired activity',m:35},{l:'Debrief',m:10}],
        sections:[
          {h:"Choose 1–2 activities", type:'activities', items:[
            ['Hot Seat: Interview Captain Thunder','One partner is Captain Thunder, the other a young godwit reporter. Ask about the storm, Wingspan, and why the Journey matters — then swap.'],
            ['Storm Sequencing','Cut up 6 sentences describing the storm scene. Pairs order them and explain how they knew.'],
            ['Vocabulary Match-Up','Card game matching each vocab word to its kid-friendly meaning — fastest correct pair wins a point.'],
            ['True or False Detective','Given 8 statements about the story, pairs find evidence in the text to prove or disprove each one.']
          ]}
        ],
        tags:['Comprehension strategies (inference, evidence-finding)','Collaborative talk']
      },
      thu:{
        time:[{l:'Recap & choose',m:5},{l:'Plan & build',m:35},{l:'Check-in',m:10}],
        sections:[
          {h:'This week\'s project options (pairs choose one)', type:'projects', items:[
            'Comic strip — retell the storm scene from Captain Thunder\'s memory, in 6 panels.',
            '"Would you go?" persuasive mini-speech — argue whether you\'d join the Journey if you were Wilfred.',
            'Fact file / travel brochure — "Visit New Zealand — Godwit Summer Home!"',
            'Podcast-style recording — in role as Wilfred, record a "voice diary" the night before leaving Alaska.'
          ]},
          {h:'Today\'s time plan', type:'list', items:[
            '~5 min — recap the story & choose project format',
            '~35 min — plan and build/draft',
            '~5–10 min — quick teacher check-in per pair'
          ]}
        ],
        tags:['Synthesis — creating a text in response to reading']
      },
      fri:{
        time:[{l:'Finish',m:22},{l:'Present',m:23},{l:'Feedback',m:5}],
        sections:[
          {h:'Finish & present', type:'list', items:[
            '~20–25 min — finish and polish the project',
            '~20–25 min — presentations, 2–3 min per pair',
            'Peer feedback: "2 stars and a wish" after each presentation'
          ]}
        ],
        tags:['Oral language — presenting ideas clearly','Key competencies — participating & contributing, relating to others']
      }
    },
    coverage:['Reading progressions','Oral language','Structured literacy','Key competencies'],
    coverageLight:'Bicultural/Aotearoa perspectives — light this week; link to real kūaka migration and its significance to Māori when reaching the non-fiction companion text.'
  },
  {n:2, title:"Journey of a Waka", built:true,
    days:{
      mon:{
        time:[{l:'Hook',m:5},{l:'Vocab & read',m:35},{l:'Check',m:10}],
        sections:[
          {h:'Lead-in questions', type:'list', items:[
            "If you were about to sail across the world's biggest ocean with no map and no GPS, what would you pack? What would you need to know?",
            "What clues in nature might tell you a storm is coming, or that land is near?",
            "Have you heard of waka hourua, or Polynesian wayfinding/navigation? What do you already know?"
          ]},
          {h:'Key vocabulary', type:'vocab', items:[
            ['waka hourua','a large double-hulled voyaging canoe used for long ocean journeys'],
            ['rangatira','the captain/leader of the waka'],
            ['tohunga','the priest and navigator — reads the sky, stars and sea'],
            ['kaihautū','the person who directs the paddlers'],
            ['kaiurungi','the steerer(s) of the waka'],
            ['adze','a tool for shaping wood, like a curved axe'],
            ['mana','prestige, authority, and respect'],
            ['oral histories','stories and knowledge passed down by speaking, generation to generation'],
            ['archaeology','the study of the past through objects and sites people left behind'],

function planSection(title, html){ return `<div class="plan-block"><h3>${title}</h3>${html}</div>`; }

function renderPlan(){
  const week = weeks.find(w=>w.n===currentWeek);
  const plan = lessonPlans[currentWeek];
  const body = document.getElementById('planBody');
  document.getElementById('planTopLabel').textContent = `Week ${week.n} Lesson Plan`;

  if(!plan){
    body.innerHTML = `
      <h2 class="doc-title">Week ${week.n} — ${week.title}</h2>
      <div class="doc-sub">Full lesson plan not written yet</div>
      <div class="empty">
        <div class="glyph">🧭</div>
        <h3>This week's lesson plan hasn't been charted yet</h3>
        <p>Once Week ${week.n}'s content is built out (following the Week 1 template), its full plan — curriculum connections, learning intentions, teacher dialogue and the Monday–Friday breakdown — will appear here.</p>
      </div>`;
    return;
  }

  const currHTML = plan.curriculum.map(([h,d])=>`<div class="curr-item"><b>${h}.</b> ${d}</div>`).join('');

  const dayOrder = ['mon','tue','wed','thu','fri'];
  const daysHTML = dayOrder.map(k=>{
    const meta = DAY_META[k];
    const d = plan.days[k];
    const steps = d.steps.map(([m,t,desc,say])=>`
      <div class="dp-step">
        <div class="mins">~${m} min</div>
        <div><b>${t}</b> — ${desc}<div class="say">${say}</div></div>
      </div>`).join('');
    return `<div class="day-plan">
      <div class="dp-head" style="background:${meta.color}">${meta.label} · ${meta.grouping}</div>
      <div class="dp-body">
        <div class="dp-wali">WALT: ${d.wali}</div>
        ${steps}
      </div>
    </div>`;
  }).join('');

  const reflectHTML = (plan.reflection||[]).map(([v,e,q])=>`
    <div class="reflect-card">
      <div class="re">${e}</div>
      <div class="rv">${v}</div>
      <div class="rq">${q}</div>
    </div>`).join('');

  body.innerHTML = `
    <h2 class="doc-title">Week ${week.n} — ${week.title}</h2>
    <div class="doc-sub">Years 5–6 · NZC English Phase 2 · Full week lesson plan</div>
    ${planSection('Learning intention (week overview)', `<div class="wali">${plan.weekIntention}</div>`)}
    ${planSection('Curriculum connections', currHTML)}
    ${planSection('Monday–Friday breakdown', daysHTML)}
    ${plan.reflection ? planSection('Christian reflection — school values', `<div class="reflect-grid">${reflectHTML}</div>`) : ''}
  `;
}

function openPlan(){
  renderPlan();
  document.getElementById('planOverlay').classList.add('open');
  document.body.classList.add('plan-open');
}
function closePlan(){
  document.getElementById('planOverlay').classList.remove('open');
  document.body.classList.remove('plan-open');
}

function renderWorksheet(week, day, key){
  const w = worksheets[week];
  const body = document.getElementById('worksheetBody');
  const title = day==='tue' ? `Week ${week} · Tuesday Guided Reading Worksheet` : `Week ${week} · Wednesday Activity Worksheet`;
  document.getElementById('wsTopLabel').textContent = title;

  const nameField = `<div class="ws-namefield"><div>Name: <span></span></div><div>Date: <span></span></div></div>`;

  if(day==='tue'){
    const g = w.tue[key];
    const compHTML = g.comprehension.map(q=>`<div class="ws-q">${q}<div class="ws-line"></div></div>`).join('');
    const infHTML = g.inference.map(q=>`<div class="ws-q">${q}<div class="ws-line"></div><div class="ws-line"></div></div>`).join('');
    const taskItemsHTML = g.task.items.length ? g.task.items.map(it=>{
      const isOrderable = /^[A-Za-z].{0,120}$/.test(it) && g.task.instructions.join(' ').toLowerCase().includes('number');
      return isOrderable ? `<div class="ws-order-box"><div class="num"></div><div>${it}</div></div>` : `<div class="ws-q">${it}<div class="ws-line"></div></div>`;
    }).join('') : `<div class="ws-line"></div><div class="ws-line"></div><div class="ws-line"></div>`;

    body.innerHTML = `
      <h2 class="doc-title">${w.storyTitle} — ${g.label}</h2>
      <div class="doc-sub">Tuesday · Guided Reading · Focus: ${g.focus}</div>
      ${nameField}
      <div class="ws-quiet">🤫 ${QUIET_NOTE}</div>
      ${planSection('Comprehension questions', compHTML)}
      ${planSection('Inference questions', infHTML)}
      ${planSection(g.task.title, `<div class="ws-res"><b>Instructions:</b><br>${g.task.instructions.map(i=>'• '+i).join('<br>')}</div>${taskItemsHTML}`)}
    `;
  } else {
    const a = w.wed[key];
    let extra = '';
    if(a.cards || a.tf){
      const arr = a.cards || a.tf;
      extra += planSection(a.tf ? 'Statements' : 'Cards / statements', `<div class="ws-cutgrid">${arr.map(c=>`<div class="ws-card">${c}${a.tf ? '<br><br><b>Circle one:</b>&nbsp;&nbsp;TRUE&nbsp;&nbsp;/&nbsp;&nbsp;FALSE<div class="ws-line" style="margin-top:6px;"></div><div style="font-family:\'JetBrains Mono\',monospace;font-size:9.5px;color:#7a6f57;">evidence from the story ↑</div>' : ''}</div>`).join('')}</div>${a.writeLines?Array(a.writeLines).fill('<div class="ws-line" style="margin-bottom:8px;"></div>').join(''):''}`);
    }
    if(a.vocab){
      extra += planSection('Word cards & meaning cards (cut apart)', `<div class="ws-cutgrid">${a.vocab.map(([wd,m])=>`<div class="ws-card"><b>${wd}</b></div>`).join('')}${a.vocab.map(([wd,m])=>`<div class="ws-card">${m}</div>`).join('')}</div>`);
    }
    if(a.starters){
      extra += planSection('Sentence starters', a.starters.map(s=>`<div class="ws-q">${s}<div class="ws-line"></div><div class="ws-line"></div></div>`).join(''));
    }
    body.innerHTML = `
      <h2 class="doc-title">${w.storyTitle} — ${a.title}</h2>
      <div class="doc-sub">Wednesday · Paired Reading Activity</div>
      ${nameField}
      ${planSection('What you need', `<div class="ws-res">${a.resources.map(r=>'• '+r).join('<br>')}</div>`)}
      ${planSection('Instructions', `<ol>${a.instructions.map(i=>`<li>${i}</li>`).join('')}</ol>`)}
      ${extra}
    `;
  }
}

function openWorksheet(week, day, key){
  renderWorksheet(week, day, key);
  document.getElementById('worksheetOverlay').classList.add('open');
  document.body.classList.add('worksheet-open');
}
function closeWorksheet(){
  document.getElementById('worksheetOverlay').classList.remove('open');
  document.body.classList.remove('worksheet-open');
}

function renderProject(week, idx){
  const g = projectGuides[week];
  const p = g.items[idx];
  const body = document.getElementById('projectBody');
  document.getElementById('projTopLabel').textContent = `Week ${week} · Project Guide`;
  body.innerHTML = `
    <h2 class="doc-title">${g.storyTitle}</h2>
    <div class="doc-sub">Understanding project · ${p.title}</div>
    ${planSection('What you need', `<div class="ws-res">${p.resources.map(r=>'• '+r).join('<br>')}</div>`)}
    ${planSection('What to do', `<ol>${p.steps.map(s=>`<li>${s}</li>`).join('')}</ol>`)}
    ${planSection('What it could look like', `<div class="proj-example"><span class="lbl2">Example</span>${p.example}</div>`)}
  `;
}
function openProject(week, idx){
  renderProject(week, idx);
  document.getElementById('projectOverlay').classList.add('open');
  document.body.classList.add('project-open');
}
function closeProject(){
  document.getElementById('projectOverlay').classList.remove('open');
  document.body.classList.remove('project-open');
}




const track = document.getElementById('track');
const weekSelect = document.getElementById('weekSelect');
const daySelect = document.getElementById('daySelect');

function buildTrack(){
  weeks.forEach(w=>{
    const stop = document.createElement('div');
    stop.className = 'stop' + (w.n===currentWeek ? ' active':'');
    stop.dataset.week = w.n;
    stop.innerHTML = `${w.n===currentWeek ? '<div class="bird">🐦</div>':''}<div class="dot"></div><div class="wk">Wk ${w.n}</div><div class="title">${w.title}</div>`;
    stop.addEventListener('click', ()=>{ currentWeek = w.n; weekSelect.value = w.n; render(); });
    track.appendChild(stop);
  });
}

function buildWeekSelect(){
  weeks.forEach(w=>{
    const opt = document.createElement('option');
    opt.value = w.n;
    opt.textContent = `Week ${w.n} — ${w.title}`;
    weekSelect.appendChild(opt);
  });
  weekSelect.value = currentWeek;
}

function timelineHTML(segments, color){
  const total = segments.reduce((a,s)=>a+s.m,0);
  return segments.map(s=>`<div class="tl-seg" style="flex:${s.m};background:${color}">${s.l} ~${s.m}m</div>`).join('');
}

function sectionHTML(sec, weekNum){
  let inner = '';
  if(sec.type==='list'){
    inner = '<ol>' + sec.items.map(i=>`<li>${i}</li>`).join('') + '</ol>';
  } else if(sec.type==='vocab'){
    inner = '<div class="vocab-grid">' + sec.items.map(([w,m])=>`<div class="vocab-card"><div class="w">${w}</div><div class="m">${m}</div></div>`).join('') + '</div>';
  } else if(sec.type==='groups'){
    const gkeys = ['A','B','C'];
    inner = '<div class="group-grid">' + sec.items.map(([g,focus,task],i)=>`<div class="group-card"><div class="g">${g}</div><p><b>Focus:</b> ${focus}</p><p><b>Task:</b> ${task}</p><button class="ws-btn" onclick="openWorksheet(${weekNum},'tue','${gkeys[i]}')">📝 Open worksheet</button></div>`).join('') + '</div>';
  } else if(sec.type==='activities'){
    inner = sec.items.map(([t,d],i)=>`<div class="activity"><div class="a-title">${t}</div><div>${d}</div><button class="ws-btn" onclick="openWorksheet(${weekNum},'wed',${i})">📝 Open worksheet</button></div>`).join('');
  } else if(sec.type==='projects'){
    inner = '<div class="project-list">' + sec.items.map((i,idx)=>`<div class="project-card" onclick="openProject(${weekNum},${idx})" style="cursor:pointer;"><div>${i}</div><button class="ws-btn" onclick="event.stopPropagation();openProject(${weekNum},${idx})">📋 View full instructions</button></div>`).join('') + '</div>';
  }
  return `<div class="section"><h3>${sec.h}</h3>${inner}</div>`;
}

function render(){
  // update track active state
  [...track.children].forEach(el=>{
    if(el.classList.contains('stop')){
      el.classList.toggle('active', Number(el.dataset.week)===currentWeek);
      el.querySelector('.bird')?.remove();
      if(Number(el.dataset.week)===currentWeek){
        el.insertAdjacentHTML('afterbegin','<div class="bird">🐦</div>');
      }
    }
  });

  const week = weeks.find(w=>w.n===currentWeek);
  const meta = DAY_META[currentDay];
  const area = document.getElementById('lessonArea');

  if(!week.built || !week.days || !week.days[currentDay]){
    area.innerHTML = `
      <div class="lesson-head">
        <div>
          <span class="daypill" style="background:${meta.color}">${meta.label}</span>
          <h2>${week.title}</h2>
          <div class="grouping">${meta.grouping} · ${meta.focus}</div>
        </div>
        <div class="duration"><b>~50</b> min</div>
      </div>
      <div class="empty">
        <div class="glyph">🧭</div>
        <h3>This week's content hasn't been charted yet</h3>
        <p>Week ${week.n} — "${week.title}" — is next in line to be built out with lead-in questions, vocabulary, activities and a project menu, following the same template as Week 1.</p>
      </div>`;
    return;
  }

  const day = week.days[currentDay];
  area.innerHTML = `
    <div class="lesson-head">
      <div>
        <span class="daypill" style="background:${meta.color}">${meta.label}</span>
        <h2>${week.title}</h2>
        <div class="grouping">${meta.grouping} · ${meta.focus}</div>
      </div>
      <div class="duration"><b>~50</b> min</div>
    </div>
    <div class="timeline">${timelineHTML(day.time, meta.color)}</div>
    <div class="lesson-body">
      ${day.sections.map(s=>sectionHTML(s, currentWeek)).join('')}
      <div class="section" style="margin-bottom:0;">
        <h3>Curriculum coverage</h3>
        <div class="tags">${day.tags.map(t=>`<span class="tag">${t}</span>`).join('')}</div>
      </div>
    </div>`;
}

buildTrack();
buildWeekSelect();

weekSelect.addEventListener('change', e=>{ currentWeek = Number(e.target.value); render(); });
daySelect.addEventListener('change', e=>{ currentDay = e.target.value; render(); });

render();
</script>
